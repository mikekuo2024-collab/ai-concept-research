<svg viewBox="0 0 1140 1680" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif">
  <rect width="1140" height="1680" fill="#faf6ee"/>

  <!-- 標題 -->
  <text x="570" y="112" text-anchor="middle" font-size="78" font-weight="900" fill="#181512" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">Claude 連接器</text>
  <text x="570" y="172" text-anchor="middle" font-size="29" fill="#33302c">（這是我每週在 Claude 實際使用的 8 個應用）</text>

  <!-- 連接虛線 -->
  <g stroke="#c96f4f" stroke-width="2.5" stroke-dasharray="9 7" fill="none">
    <line x1="520" y1="383" x2="562" y2="872"/>
    <line x1="620" y1="383" x2="578" y2="872"/>
    <line x1="520" y1="733" x2="548" y2="890"/>
    <line x1="620" y1="733" x2="592" y2="890"/>
    <line x1="520" y1="1083" x2="548" y2="926"/>
    <line x1="620" y1="1083" x2="592" y2="926"/>
    <line x1="520" y1="1433" x2="562" y2="944"/>
    <line x1="620" y1="1433" x2="578" y2="944"/>
  </g>

  <!-- 中央 Claude 圖示 -->
  <g>
    <circle cx="570" cy="908" r="50" fill="#c96f4f"/>
    <g stroke="#f6e8d8" stroke-width="7" stroke-linecap="round">
      <line x1="570" y1="878" x2="570" y2="938"/>
      <line x1="540" y1="908" x2="600" y2="908"/>
      <line x1="549" y1="887" x2="591" y2="929"/>
      <line x1="591" y1="887" x2="549" y2="929"/>
      <line x1="555" y1="881" x2="585" y2="935"/>
      <line x1="585" y1="881" x2="555" y2="935"/>
      <line x1="543" y1="894" x2="597" y2="922"/>
      <line x1="597" y1="894" x2="543" y2="922"/>
    </g>
  </g>

  <!-- 中央欄小 icon（依連線順序） -->
  <g>
    <!-- Granola -->
    <rect x="546" y="452" width="48" height="48" rx="12" fill="#ffffff" stroke="#b9b2a6" stroke-width="1.5"/>
    <circle cx="570" cy="476" r="15" fill="none" stroke="#8a9a3a" stroke-width="4"/>
    <circle cx="570" cy="476" r="6" fill="none" stroke="#8a9a3a" stroke-width="3"/>
    <!-- Google Drive -->
    <rect x="546" y="524" width="48" height="48" rx="12" fill="#ffffff" stroke="#b9b2a6" stroke-width="1.5"/>
    <path d="M570 534 l13 22 h-26 z" fill="#fbbc04"/>
    <path d="M562 564 h16 l-8 -13 z" fill="#34a853"/>
    <path d="M570 534 l-13 22 l5 8 l11 -19 z" fill="#4285f4"/>
    <!-- Gmail -->
    <rect x="546" y="672" width="48" height="48" rx="12" fill="#ffffff" stroke="#b9b2a6" stroke-width="1.5"/>
    <path d="M554 684 v24 h7 v-15 l9 8 l9 -8 v15 h7 v-24 l-16 13 z" fill="#d84c3f"/>
    <!-- Notion -->
    <rect x="546" y="744" width="48" height="48" rx="12" fill="#ffffff" stroke="#b9b2a6" stroke-width="1.5"/>
    <rect x="558" y="754" width="24" height="28" rx="3" fill="none" stroke="#181512" stroke-width="3"/>
    <text x="570" y="776" text-anchor="middle" font-size="17" font-weight="800" fill="#181512">N</text>
    <!-- Slack -->
    <rect x="546" y="1024" width="48" height="48" rx="12" fill="#ffffff" stroke="#b9b2a6" stroke-width="1.5"/>
    <g transform="translate(570,1048)">
      <rect x="-4" y="-16" width="8" height="12" rx="4" fill="#36c5f0"/>
      <rect x="-4" y="4" width="8" height="12" rx="4" fill="#2eb67d"/>
      <rect x="-16" y="-4" width="12" height="8" rx="4" fill="#e01e5a"/>
      <rect x="4" y="-4" width="12" height="8" rx="4" fill="#ecb22e"/>
    </g>
    <!-- Google Calendar -->
    <rect x="546" y="1096" width="48" height="48" rx="12" fill="#ffffff" stroke="#b9b2a6" stroke-width="1.5"/>
    <rect x="556" y="1106" width="28" height="28" rx="4" fill="none" stroke="#4285f4" stroke-width="3"/>
    <text x="570" y="1127" text-anchor="middle" font-size="14" font-weight="700" fill="#4285f4">31</text>
    <!-- Canva -->
    <rect x="546" y="1244" width="48" height="48" rx="12" fill="#ffffff" stroke="#b9b2a6" stroke-width="1.5"/>
    <circle cx="570" cy="1268" r="15" fill="none" stroke="#7d2ae8" stroke-width="4"/>
    <text x="570" y="1275" text-anchor="middle" font-size="17" font-weight="800" fill="#7d2ae8">C</text>
    <!-- Gamma -->
    <rect x="546" y="1316" width="48" height="48" rx="12" fill="#ffffff" stroke="#b9b2a6" stroke-width="1.5"/>
    <text x="570" y="1350" text-anchor="middle" font-size="24" font-weight="900" fill="#181512">G</text>
  </g>

  <!-- ========== 卡片 1：GRANOLA（左上） ========== -->
  <g>
    <rect x="60" y="266" width="460" height="234" rx="6" fill="#fdfaf3" stroke="#c96f4f" stroke-width="2.5"/>
    <rect x="60" y="266" width="460" height="48" fill="#2f2a28"/>
    <text x="112" y="298" font-size="23" font-weight="800" fill="#ffffff">GRANOLA</text>
    <text x="502" y="297" text-anchor="end" font-size="18" fill="#d8d2c8">會議筆記</text>
    <circle cx="62" cy="268" r="27" fill="#c96f4f"/>
    <text x="62" y="277" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff">1</text>
    <text x="86" y="348" font-size="18" fill="#33302c">我的<tspan font-weight="800">筆記工具</tspan>。</text>
    <text x="86" y="378" font-size="18" fill="#33302c">它會自動擷取每一場會議的逐字稿。</text>
    <text x="86" y="408" font-size="18" fill="#33302c">我請 Claude <tspan font-weight="800">調出上一場會議</tspan>、</text>
    <text x="86" y="438" font-size="18" fill="#33302c"><tspan font-weight="800">做成摘要</tspan>，並列出每個行動項目</text>
    <text x="86" y="468" font-size="18" fill="#33302c">與截止期限。</text>
  </g>

  <!-- ========== 卡片 5：GOOGLE DRIVE（右上） ========== -->
  <g>
    <rect x="620" y="266" width="460" height="234" rx="6" fill="#fdfaf3" stroke="#c96f4f" stroke-width="2.5"/>
    <rect x="620" y="266" width="460" height="48" fill="#2f2a28"/>
    <text x="644" y="298" font-size="23" font-weight="800" fill="#ffffff">GOOGLE DRIVE</text>
    <text x="1040" y="297" text-anchor="end" font-size="18" fill="#d8d2c8">文件、試算表</text>
    <circle cx="1078" cy="268" r="27" fill="#c96f4f"/>
    <text x="1078" y="277" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff">5</text>
    <text x="646" y="348" font-size="18" fill="#33302c">我在 Cowork <tspan font-weight="800">說明我要的試算表</tspan>，</text>
    <text x="646" y="378" font-size="18" fill="#33302c">用追問<tspan font-weight="800">逐步微調</tspan>，然後按一個按鍵。</text>
    <text x="646" y="408" font-size="18" fill="#33302c">它就以 <tspan font-weight="800">Google Sheet</tspan> 開在雲端硬碟。</text>
    <text x="646" y="438" font-size="18" fill="#33302c">內容已填好。立即可用。</text>
  </g>

  <!-- ========== 卡片 2：GMAIL（左二） ========== -->
  <g>
    <rect x="60" y="616" width="460" height="234" rx="6" fill="#fdfaf3" stroke="#c96f4f" stroke-width="2.5"/>
    <rect x="60" y="616" width="460" height="48" fill="#2f2a28"/>
    <text x="112" y="648" font-size="23" font-weight="800" fill="#ffffff">GMAIL</text>
    <text x="502" y="647" text-anchor="end" font-size="18" fill="#d8d2c8">電子郵件</text>
    <circle cx="62" cy="618" r="27" fill="#c96f4f"/>
    <text x="62" y="627" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff">2</text>
    <text x="86" y="698" font-size="18" fill="#33302c">我請 Claude <tspan font-weight="800">讀我的 Gmail</tspan>，把郵件</text>
    <text x="86" y="728" font-size="18" fill="#33302c"><tspan font-weight="800">分成 3 類</tspan>：今天回覆、等到週五、忽略。</text>
    <text x="86" y="758" font-size="18" fill="#33302c">接著它把回覆<tspan font-weight="800">存成草稿</tspan>。</text>
    <text x="86" y="788" font-size="18" fill="#33302c">存在 Gmail 裡，不是在對話裡。</text>
  </g>

  <!-- ========== 卡片 6：NOTION（右二） ========== -->
  <g>
    <rect x="620" y="616" width="460" height="234" rx="6" fill="#fdfaf3" stroke="#c96f4f" stroke-width="2.5"/>
    <rect x="620" y="616" width="460" height="48" fill="#2f2a28"/>
    <text x="644" y="648" font-size="23" font-weight="800" fill="#ffffff">NOTION</text>
    <text x="1040" y="647" text-anchor="end" font-size="18" fill="#d8d2c8">知識庫</text>
    <circle cx="1078" cy="618" r="27" fill="#c96f4f"/>
    <text x="1078" y="627" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff">6</text>
    <text x="646" y="698" font-size="18" fill="#33302c">我請 Claude 從 Notion <tspan font-weight="800">擷取內容日曆</tspan>，</text>
    <text x="646" y="728" font-size="18" fill="#33302c">用同樣的想法再創作 2 篇新貼文。</text>
    <text x="646" y="758" font-size="18" fill="#33302c">不是把思考外包出去，</text>
    <text x="646" y="788" font-size="18" fill="#33302c">而是<tspan font-weight="800">有更多點子</tspan>可以挑選。</text>
  </g>

  <!-- ========== 卡片 3：SLACK（左三） ========== -->
  <g>
    <rect x="60" y="966" width="460" height="234" rx="6" fill="#fdfaf3" stroke="#c96f4f" stroke-width="2.5"/>
    <rect x="60" y="966" width="460" height="48" fill="#2f2a28"/>
    <text x="112" y="998" font-size="23" font-weight="800" fill="#ffffff">SLACK</text>
    <text x="502" y="997" text-anchor="end" font-size="18" fill="#d8d2c8">團隊溝通</text>
    <circle cx="62" cy="968" r="27" fill="#c96f4f"/>
    <text x="62" y="977" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff">3</text>
    <text x="86" y="1048" font-size="18" fill="#33302c">我請 Claude 讀過去 48 小時的頻道，</text>
    <text x="86" y="1078" font-size="18" fill="#33302c">找出我必須回應的 <tspan font-weight="800">3 件事</tspan>。</text>
    <text x="86" y="1108" font-size="18" fill="#33302c">它會自動略過玩笑話和站會更新。</text>
  </g>

  <!-- ========== 卡片 7：GOOGLE CALENDAR（右三） ========== -->
  <g>
    <rect x="620" y="966" width="460" height="234" rx="6" fill="#fdfaf3" stroke="#c96f4f" stroke-width="2.5"/>
    <rect x="620" y="966" width="460" height="48" fill="#2f2a28"/>
    <text x="644" y="998" font-size="22" font-weight="800" fill="#ffffff">GOOGLE CALENDAR</text>
    <text x="1040" y="997" text-anchor="end" font-size="18" fill="#d8d2c8">行事曆</text>
    <circle cx="1078" cy="968" r="27" fill="#c96f4f"/>
    <text x="1078" y="977" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff">7</text>
    <text x="646" y="1048" font-size="18" font-weight="800" fill="#33302c">找出空檔、砍掉沒用的會議。</text>
    <text x="646" y="1078" font-size="18" fill="#33302c">我請 Claude 找出下週和某人共同的</text>
    <text x="646" y="1108" font-size="18" fill="#33302c">30 分鐘空檔，</text>
    <text x="646" y="1138" font-size="18" fill="#33302c">再列出我應該取消的會議。</text>
  </g>

  <!-- ========== 卡片 4：CANVA（左四） ========== -->
  <g>
    <rect x="60" y="1316" width="460" height="234" rx="6" fill="#fdfaf3" stroke="#c96f4f" stroke-width="2.5"/>
    <rect x="60" y="1316" width="460" height="48" fill="#2f2a28"/>
    <text x="112" y="1348" font-size="23" font-weight="800" fill="#ffffff">CANVA</text>
    <text x="502" y="1347" text-anchor="end" font-size="18" fill="#d8d2c8">設計師</text>
    <circle cx="62" cy="1318" r="27" fill="#c96f4f"/>
    <text x="62" y="1327" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff">4</text>
    <text x="86" y="1398" font-size="18" fill="#33302c">點子 → <tspan font-weight="800">視覺設計</tspan>，幾分鐘搞定。</text>
    <text x="86" y="1428" font-size="18" fill="#33302c"><tspan font-weight="800">請 Claude</tspan> 把一個想法變成 5 頁</text>
    <text x="86" y="1458" font-size="18" fill="#33302c">LinkedIn 輪播貼文，</text>
    <text x="86" y="1488" font-size="18" fill="#33302c">使用我的品牌色。</text>
  </g>

  <!-- ========== 卡片 8：GAMMA（右四） ========== -->
  <g>
    <rect x="620" y="1316" width="460" height="234" rx="6" fill="#fdfaf3" stroke="#c96f4f" stroke-width="2.5"/>
    <rect x="620" y="1316" width="460" height="48" fill="#2f2a28"/>
    <text x="644" y="1348" font-size="23" font-weight="800" fill="#ffffff">GAMMA</text>
    <text x="1040" y="1347" text-anchor="end" font-size="18" fill="#d8d2c8">簡報</text>
    <circle cx="1078" cy="1318" r="27" fill="#c96f4f"/>
    <text x="1078" y="1327" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff">8</text>
    <text x="646" y="1398" font-size="18" fill="#33302c">我告訴 Claude 就任何主題<tspan font-weight="800">做簡報</tspan>，</text>
    <text x="646" y="1428" font-size="18" fill="#33302c">一頁一個重點，視覺化又乾淨。</text>
    <text x="646" y="1458" font-size="18" fill="#33302c">簡報在 Claude 內完成，</text>
    <text x="646" y="1488" font-size="18" fill="#33302c">我再進 <tspan font-weight="800">Gamma</tspan> 繼續編輯。</text>
  </g>

  <!-- 頁尾 -->
  <text x="60" y="1626" font-size="16" fill="#55504a">出處：Ruben Hassid「How to AI」 · 中文重製版，依原圖風格重繪</text>
  <text x="1080" y="1626" text-anchor="end" font-size="16" fill="#55504a">下載更多資訊圖：how-to-ai.guide</text>
</svg>
