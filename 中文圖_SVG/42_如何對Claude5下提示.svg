<svg viewBox="0 0 1200 1530" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif">
  <rect width="1200" height="1530" fill="#F4F1EC"/>

  <!-- 標題橫幅 -->
  <rect x="40" y="40" width="1120" height="110" rx="14" fill="#C75B45"/>
  <text x="600" y="115" font-size="62" font-weight="700" fill="#FFFFFF" text-anchor="middle" font-family="'Songti TC','Noto Serif CJK TC','PingFang TC',serif">如何對 Claude-5 下提示</text>
  <text x="600" y="212" font-size="38" font-weight="700" fill="#1E1B18" text-anchor="middle">（發揮它的最大實力）</text>

  <!-- 金字塔 -->
  <g stroke="#F4F1EC" stroke-width="4">
    <polygon points="880,272 936,374 824,374" fill="#EBA894"/>
    <polygon points="936,374 992,476 768,476 824,374" fill="#E08A72"/>
    <polygon points="992,476 1048,578 712,578 768,476" fill="#C75B45"/>
    <polygon points="1048,578 1104,680 656,680 712,578" fill="#8F3E2E"/>
    <polygon points="1104,680 1160,782 600,782 656,680" fill="#DDD3C0"/>
  </g>
  <g font-size="33" font-weight="700" fill="#1E1B18" text-anchor="end" font-family="'Songti TC','Noto Serif CJK TC','PingFang TC',serif">
    <text x="800" y="340">專案 Project</text>
    <text x="746" y="442">技能 Skills</text>
    <text x="690" y="544">提問確認 AskUserQuestion</text>
    <text x="634" y="646">目標 Goal</text>
    <text x="578" y="748">投入程度 Effort</text>
  </g>

  <!-- 左側：Project 區塊 -->
  <rect x="70" y="276" width="130" height="46" rx="8" fill="#EBA894"/>
  <text x="135" y="308" font-size="26" font-weight="700" fill="#5A2A1E" text-anchor="middle">專案</text>
  <g font-size="21" fill="#33302C">
    <text x="76" y="362">刪掉你的資料夾，改建一個 Project：</text>
    <text x="76" y="392">跨對話共用的檔案＋指示。</text>
    <text x="76" y="422">一個任務一個 Project。可與團隊共享。</text>
    <text x="76" y="452">（僅付費方案提供）</text>
  </g>

  <!-- 左側：Skills 區塊 -->
  <rect x="70" y="520" width="130" height="46" rx="8" fill="#E08A72"/>
  <text x="135" y="552" font-size="26" font-weight="700" fill="#4A2418" text-anchor="middle">技能</text>
  <g font-size="21" fill="#33302C">
    <text x="76" y="606">「關於我」檔案現在就是一個技能。</text>
    <text x="76" y="636">一個 / 指令，勝過一段存起來的提示。</text>
    <text x="76" y="666">判斷標準：能教會一個人的，</text>
    <text x="76" y="696">就能做成一個 Skill。</text>
  </g>

  <!-- 虛線連接 -->
  <g stroke="#555049" stroke-width="2" stroke-dasharray="7 6" fill="none">
    <path d="M 60 299 L 46 299 L 46 972 L 140 972"/>
    <path d="M 210 543 L 400 543 L 400 900 L 410 900"/>
    <path d="M 370 1256 L 370 1195"/>
    <path d="M 540 1256 L 540 1130"/>
    <path d="M 930 1274 L 930 1160"/>
  </g>

  <!-- 範例框 -->
  <rect x="90" y="850" width="1020" height="350" rx="18" fill="#FFFFFF" stroke="#C75B45" stroke-width="2"/>
  <text x="130" y="912" font-size="33" font-weight="700" fill="#1E1B18">範例</text>

  <g font-size="22">
    <rect x="128" y="938" width="770" height="34" rx="5" fill="#EBA894"/>
    <text x="140" y="963" fill="#3A1D14">打開我的「課程上市 Project」——受眾筆記與上市細節都在裡面。</text>
    <rect x="128" y="976" width="700" height="34" rx="5" fill="#EBA894"/>
    <text x="140" y="1001" fill="#3A1D14">也看看「過往上市紀錄」文件，了解上次哪些做法有效。</text>
    <rect x="128" y="1014" width="860" height="34" rx="5" fill="#E08A72"/>
    <text x="140" y="1039" fill="#3A1D14">執行 /linkedin-post，要符合我的開頭鉤子與語氣：不用 AI 慣用語、</text>
    <rect x="128" y="1052" width="380" height="34" rx="5" fill="#E08A72"/>
    <text x="140" y="1077" fill="#3A1D14">不用長破折號、每段最多 3 句。</text>
    <rect x="518" y="1052" width="470" height="34" rx="5" fill="#C75B45"/>
    <text x="530" y="1077" fill="#FFFFFF">動筆之前，把你需要知道的一切都先問我；</text>
    <rect x="128" y="1090" width="620" height="34" rx="5" fill="#C75B45"/>
    <text x="140" y="1115" fill="#FFFFFF">若我的回答改變了切入角度，就再問一次——不要用猜的。</text>
    <rect x="758" y="1090" width="230" height="34" rx="5" fill="#8F3E2E"/>
    <text x="770" y="1115" fill="#FFFFFF">目標：一篇週二發佈、</text>
    <rect x="128" y="1128" width="740" height="34" rx="5" fill="#8F3E2E"/>
    <text x="140" y="1153" fill="#FFFFFF">能讓非技術專業人士留言回覆（而不只是按讚）的課程上市貼文。</text>
    <rect x="128" y="1166" width="330" height="34" rx="5" fill="#DDD3C0"/>
    <text x="140" y="1191" fill="#33302C">使用 Fable-5，effort High。</text>
  </g>

  <!-- 底部三區塊 -->
  <rect x="140" y="1256" width="290" height="52" rx="10" fill="#C75B45"/>
  <text x="285" y="1291" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle">AskUserQuestion</text>
  <g font-size="21" fill="#33302C">
    <text x="86" y="1350">在提示的結尾加上：</text>
    <text x="86" y="1380" font-style="italic">「開始之前，把你需要知道的一切</text>
    <text x="86" y="1410" font-style="italic">都先問我，才能把這件事做對。」</text>
  </g>

  <rect x="470" y="1256" width="140" height="52" rx="10" fill="#8F3E2E"/>
  <text x="540" y="1291" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle">目標</text>
  <g font-size="21" fill="#33302C">
    <text x="466" y="1350">別再派任務，改給目標——你要的</text>
    <text x="466" y="1380">成果＋你知道的一切。Fable 5 會</text>
    <text x="466" y="1410">自己規劃，連續工作好幾個小時。</text>
  </g>

  <rect x="850" y="1256" width="160" height="52" rx="10" fill="#DDD3C0" stroke="#8A8172" stroke-width="2"/>
  <text x="930" y="1291" font-size="26" font-weight="700" fill="#33302C" text-anchor="middle">投入程度</text>
  <g font-size="21" fill="#33302C">
    <text x="846" y="1350">正式工作：Fable 5＋effort High。</text>
    <text x="846" y="1380">最難的問題：用 Max。</text>
    <text x="846" y="1410">快速草稿：用 Sonnet。</text>
  </g>

  <!-- 頁尾 -->
  <text x="60" y="1492" font-size="17" fill="#6E675E">更多資訊圖請至 how-to-ai.guide</text>
  <text x="1140" y="1492" font-size="17" fill="#6E675E" text-anchor="end">中文重製版 · 依原圖風格重繪（原作：Ruben Hassid「How to AI」）</text>
</svg>
