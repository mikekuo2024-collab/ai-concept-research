    <text x="76" y="116" font-size="15.5" font-weight="800" fill="#60a5fa" text-anchor="middle">發想</text>
    <text x="76" y="144" font-size="12" fill="#c3cedb" text-anchor="middle">腦力激盪概念、</text>
    <text x="76" y="162" font-size="12" fill="#c3cedb" text-anchor="middle">產生視覺構想，</text>
    <text x="76" y="180" font-size="12" fill="#c3cedb" text-anchor="middle">讓創意專案成真。</text>
