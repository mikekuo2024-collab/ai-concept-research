<svg viewBox="0 0 1140 1460" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif">
  <defs>
    <linearGradient id="tl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="0.35" stop-color="#c026d3"/>
      <stop offset="0.68" stop-color="#d97706"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
