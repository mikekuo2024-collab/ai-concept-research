  <line x1="701" y1="890" x2="1081" y2="890" stroke="#eef2f7"/><line x1="701" y1="923" x2="1081" y2="923" stroke="#eef2f7"/><line x1="701" y1="956" x2="1081" y2="956" stroke="#eef2f7"/><line x1="701" y1="998" x2="1081" y2="998" stroke="#eef2f7"/>
  <text x="718" y="1050" font-size="12" font-style="italic" fill="#94a3b8" font-family="Menlo,Consolas,monospace">＋ brand-kit、substack-cover、viral-hook…</text>

  <!-- ═══ 卡片 4 · Agents ═══ -->
  <circle cx="64" cy="1258" r="26" fill="#2563eb"/>
  <text x="64" y="1268" font-size="26" font-weight="800" fill="#ffffff" text-anchor="middle">4</text>
  <rect x="104" y="1108" width="1006" height="300" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="132" y="1146" font-size="13" font-weight="700" letter-spacing="2" fill="#2563eb">檔案 · 團隊層（THE TEAM LAYER）</text>
  <text x="132" y="1182" font-size="27" font-weight="800" fill="#111118">Agents 代理</text>
  <rect x="132" y="1196" width="228" height="24" rx="6" fill="#eff6ff"/>
  <text x="142" y="1213" font-size="13" font-family="Menlo,Consolas,monospace" fill="#1d4ed8">.claude/agents/{role}.md</text>
  <text x="132" y="1246" font-size="14.5" fill="#374151">每個代理都是<tspan font-weight="700">只做一件事的員工</tspan>。管線依序交棒，</text>
  <text x="132" y="1268" font-size="14.5" fill="#374151">中間完全不需要人。</text>
  <g font-size="14.5" fill="#1f2937">
    <rect x="132" y="1284" width="22" height="22" rx="6" fill="#2563eb"/><text x="143" y="1300" fill="#fff" font-weight="700" text-anchor="middle" font-size="13">1</text>
    <text x="164" y="1300">用白話描述你需要的專家。</text>
    <rect x="132" y="1312" width="22" height="22" rx="6" fill="#2563eb"/><text x="143" y="1328" fill="#fff" font-weight="700" text-anchor="middle" font-size="13">2</text>
    <text x="164" y="1328">Claude 寫好代理檔：提示詞＋指定模型。</text>
    <rect x="132" y="1340" width="22" height="22" rx="6" fill="#2563eb"/><text x="143" y="1356" fill="#fff" font-weight="700" text-anchor="middle" font-size="13">3</text>
    <text x="164" y="1356"><tspan font-weight="700">Opus</tspan> 負責分析與評審，<tspan font-weight="700">Sonnet</tspan> 負責執行。</text>
    <rect x="132" y="1368" width="22" height="22" rx="6" fill="#2563eb"/><text x="143" y="1384" fill="#fff" font-weight="700" text-anchor="middle" font-size="13">4</text>
    <text x="164" y="1384">把代理串成管線，冷靜地跑 QA。</text>
  </g>
