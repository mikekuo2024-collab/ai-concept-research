    <text x="856" y="912">規劃一天 · 行事曆＋收件匣</text>
    <text x="856" y="945">挖掘內容靈感</text>
    <text x="856" y="979">產出這張資訊圖</text>
    <text x="856" y="1017">逐字稿轉 Reel 腳本</text>
