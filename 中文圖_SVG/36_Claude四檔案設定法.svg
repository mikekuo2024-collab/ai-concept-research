    <text x="744" y="733" fill="#9d7bb0" font-style="italic">＋ 還有 129 個記憶檔案</text>
  </g>

  <!-- ═══ 卡片 3 · Skills ═══ -->
  <circle cx="64" cy="942" r="26" fill="#d97706"/>
  <text x="64" y="952" font-size="26" font-weight="800" fill="#ffffff" text-anchor="middle">3</text>
  <rect x="104" y="792" width="1006" height="300" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="132" y="830" font-size="13" font-weight="700" letter-spacing="2" fill="#d97706">檔案 · 行動層（THE ACTION LAYER）</text>
  <text x="132" y="866" font-size="27" font-weight="800" fill="#111118">Skills 技能</text>
  <rect x="132" y="880" width="210" height="24" rx="6" fill="#fffbeb"/>
  <text x="142" y="897" font-size="13" font-family="Menlo,Consolas,monospace" fill="#b45309">skills/{name}/SKILL.md</text>
  <text x="132" y="930" font-size="14.5" fill="#374151">帶它走過一次流程，Claude 就打包成<tspan font-weight="700">可重複使用的一行指令</tspan></text>
  <text x="132" y="952" font-size="14.5" fill="#374151"><tspan font-weight="700">工作流</tspan>，任何對話都能發動。</text>
  <g font-size="14.5" fill="#1f2937">
    <rect x="132" y="968" width="22" height="22" rx="6" fill="#d97706"/><text x="143" y="984" fill="#fff" font-weight="700" text-anchor="middle" font-size="13">1</text>
    <text x="164" y="984">用白話告訴 Claude 這個技能要做什麼。</text>
    <rect x="132" y="996" width="22" height="22" rx="6" fill="#d97706"/><text x="143" y="1012" fill="#fff" font-weight="700" text-anchor="middle" font-size="13">2</text>
    <text x="164" y="1012">Claude 自動搭好 <tspan font-family="Menlo,Consolas,monospace" fill="#b45309">SKILL.md</tspan> 與資料夾結構。</text>
    <rect x="132" y="1024" width="22" height="22" rx="6" fill="#d97706"/><text x="143" y="1040" fill="#fff" font-weight="700" text-anchor="middle" font-size="13">3</text>
    <text x="164" y="1040">接上 MCP 連接器：Notion、Gmail、Drive。</text>
    <rect x="132" y="1052" width="22" height="22" rx="6" fill="#d97706"/><text x="143" y="1068" fill="#fff" font-weight="700" text-anchor="middle" font-size="13">4</text>
    <text x="164" y="1068">在任何對話用 <tspan font-family="Menlo,Consolas,monospace" fill="#b45309">/{name}</tspan> 一鍵發動。</text>
  </g>
