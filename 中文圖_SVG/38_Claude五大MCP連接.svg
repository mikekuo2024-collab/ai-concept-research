    <circle cx="672" cy="70" r="30" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="672" y="79" font-size="22" font-weight="800" fill="#93c5fd" text-anchor="middle">&lt;/&gt;</text>
    <text x="718" y="52" font-size="14" fill="#cbd5e1">即時讀取、搜尋並</text>
    <text x="718" y="74" font-size="14" fill="#cbd5e1">操作你的儲存庫</text>
    <text x="718" y="96" font-size="14" fill="#cbd5e1">與程式碼。</text>
