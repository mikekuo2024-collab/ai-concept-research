    <g stroke="#7dd3fc" stroke-width="2.5" fill="none"><rect x="659" y="57" width="26" height="26" rx="3"/><line x1="659" y1="66" x2="685" y2="66"/><line x1="659" y1="74" x2="685" y2="74"/><line x1="668" y1="57" x2="668" y2="83"/><line x1="676" y1="57" x2="676" y2="83"/></g>
