    <text x="248" y="38" font-size="26" font-weight="900" fill="#60a5fa">GITHUB MCP</text>
    <text x="248" y="66" font-size="15" fill="#d7e1ec">把 Claude 連上你的 GitHub 儲存庫。</text>
    <text x="248" y="88" font-size="15" fill="#d7e1ec">搜尋程式碼、審查 PR、分析專案、</text>
    <text x="248" y="110" font-size="15" fill="#d7e1ec">管理檔案——全部在對話中完成。</text>
