      <circle cx="35" cy="42" r="4" fill="#0f172a"/><circle cx="53" cy="42" r="4" fill="#0f172a"/>
      <path d="M40 58 q4 4 8 0" stroke="#0f172a" stroke-width="2" fill="none"/>
