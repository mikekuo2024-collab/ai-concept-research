<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 820" font-family="'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif">
  <rect width="700" height="820" fill="#ffffff"/>
  <!-- Title -->
  <g transform="translate(30,30)">
    <g transform="translate(0,5)" fill="#F25C26">
      <circle cx="20" cy="22" r="4"/>
      <g stroke="#F25C26" stroke-width="4" stroke-linecap="round">
        <line x1="20" y1="22" x2="20" y2="2"/><line x1="20" y1="22" x2="20" y2="42"/>
        <line x1="20" y1="22" x2="2" y2="22"/><line x1="20" y1="22" x2="38" y2="22"/>
        <line x1="20" y1="22" x2="7" y2="9"/><line x1="20" y1="22" x2="33" y2="35"/>
        <line x1="20" y1="22" x2="33" y2="9"/><line x1="20" y1="22" x2="7" y2="35"/>
      </g>
    </g>
    <text x="55" y="22" font-size="34" font-weight="800" fill="#1a1a2e">Claude</text>
    <text x="55" y="58" font-size="34" font-weight="800" fill="#1a1a2e">提示框架</text>
    <line x1="55" y1="72" x2="430" y2="72" stroke="#2b6cb0" stroke-width="3"/>
    <circle cx="55" cy="72" r="5" fill="#F25C26"/>
  </g>

  <!-- 1 Core formula -->
  <g transform="translate(30,120)">
    <rect width="640" height="120" rx="12" fill="#FFF3E9"/>
    <circle cx="28" cy="28" r="16" fill="#F25C26"/><text x="28" y="34" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <rect x="52" y="14" width="36" height="44" rx="4" fill="#F25C26"/>
    <g stroke="#fff" stroke-width="2.5"><line x1="60" y1="26" x2="80" y2="26"/><line x1="60" y1="34" x2="80" y2="34"/><line x1="60" y1="42" x2="74" y2="42"/></g>
    <text x="104" y="32" font-size="17" font-weight="800" fill="#F25C26">核心提示公式</text>
    <rect x="104" y="44" width="510" height="30" rx="6" fill="#fff" stroke="#F0C9AE"/>
    <text x="116" y="64" font-size="13.5" fill="#333">［動作動詞］［具體交付物］，以便［對象完成 X 達到 Y］。</text>
    <g font-size="12" fill="#333">
      <text x="104" y="96" font-weight="700" fill="#F25C26">範圍：</text><text x="150" y="96">納入什麼／排除什麼</text>
      <text x="320" y="96" font-weight="700" fill="#F25C26">長度：</text><text x="366" y="96">精確—約 150 字</text>
      <text x="510" y="96" font-weight="700" fill="#F25C26">格式：</text><text x="510" y="112">表格／條列</text>
    </g>
  </g>

  <!-- 2 and 3 -->
  <g transform="translate(30,260)">
    <rect width="312" height="120" rx="12" fill="#FCE7F0"/>
    <circle cx="26" cy="26" r="15" fill="#E0457B"/><text x="26" y="32" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="50" y="24" font-size="13.5" font-weight="800" fill="#E0457B">回應前先完整</text>
    <text x="50" y="42" font-size="13.5" font-weight="800" fill="#E0457B">讀完這些檔案：</text>
    <g font-size="11.5" fill="#333">
      <circle cx="26" cy="62" r="2.5" fill="#E0457B"/><text x="36" y="66">［檔名.md］—內容說明</text>
      <circle cx="26" cy="86" r="2.5" fill="#E0457B"/><text x="36" y="90">［檔名.md］—內容說明</text>
    </g>
  </g>
  <g transform="translate(358,260)">
    <rect width="312" height="120" rx="12" fill="#EDE7FA"/>
    <circle cx="26" cy="26" r="15" fill="#7C4DD1"/><text x="26" y="32" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="50" y="24" font-size="13.5" font-weight="800" fill="#7C4DD1">對齊這個參考範例</text>
    <text x="50" y="42" font-size="13.5" font-weight="800" fill="#7C4DD1">的節奏：</text>
    <text x="20" y="64" font-size="11.5" fill="#333">貼上參考範例，或以 markdown 上傳</text>
    <text x="20" y="84" font-size="11.5" font-weight="700" fill="#333">套用這些模式（只取正向規則）：</text>
    <text x="20" y="104" font-size="11" fill="#333">• 永遠［模式1 — 結構］  • 永遠［模式2 — 語氣］</text>
  </g>

  <!-- 4 Output + voice -->
  <g transform="translate(30,400)">
    <rect width="640" height="120" rx="12" fill="#E6F0FB"/>
    <circle cx="26" cy="26" r="15" fill="#2b6cb0"/><text x="26" y="32" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <text x="50" y="32" font-size="15" font-weight="800" fill="#2b6cb0">輸出＋語氣細節</text>
    <g font-size="11.5" fill="#333">
      <circle cx="26" cy="58" r="2.5" fill="#2b6cb0"/><text x="36" y="62" font-weight="700" fill="#2b6cb0">輸出＋長度：</text><text x="120" y="62">精確字數／條列／段數</text>
      <circle cx="26" cy="80" r="2.5" fill="#2b6cb0"/><text x="36" y="84" font-weight="700" fill="#2b6cb0">對象反應：</text><text x="112" y="84">他們會回覆／核准／預約</text>
      <circle cx="26" cy="102" r="2.5" fill="#2b6cb0"/><text x="36" y="106" font-weight="700" fill="#2b6cb0">語氣對齊：</text><text x="112" y="106">貼 2–3 句你想要的語氣</text>
      <circle cx="350" cy="58" r="2.5" fill="#2b6cb0"/><text x="360" y="62" font-weight="700" fill="#2b6cb0">語氣：</text><text x="406" y="62">直接、溫暖、自信、技術性</text>
      <circle cx="350" cy="80" r="2.5" fill="#2b6cb0"/><text x="360" y="84" font-weight="700" fill="#2b6cb0">聽起來像：</text><text x="430" y="84">清楚、具體三特質</text>
      <circle cx="350" cy="102" r="2.5" fill="#2b6cb0"/><text x="360" y="106" font-weight="700" fill="#2b6cb0">成功定義：</text><text x="430" y="106">對象採取的那一個行動</text>
    </g>
  </g>

  <!-- 5 and 6 -->
  <g transform="translate(30,540)">
    <rect width="312" height="110" rx="12" fill="#E6F6EC"/>
    <circle cx="26" cy="26" r="15" fill="#2E9E5B"/><text x="26" y="32" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">5</text>
    <text x="50" y="32" font-size="14" font-weight="800" fill="#2E9E5B">寫作指引</text>
    <g font-size="11" fill="#333">
      <circle cx="24" cy="54" r="2.2" fill="#2E9E5B"/><text x="33" y="58">用 16 歲也能朗讀的白話寫</text>
      <circle cx="24" cy="74" r="2.2" fill="#2E9E5B"/><text x="33" y="78">用簡短、具體、真實的字</text>
      <circle cx="24" cy="94" r="2.2" fill="#2E9E5B"/><text x="33" y="98">把「善用」「運用」改成「用」</text>
    </g>
  </g>
  <g transform="translate(358,540)">
    <rect width="312" height="110" rx="12" fill="#FFF3E9"/>
    <circle cx="26" cy="26" r="15" fill="#F25C26"/><text x="26" y="32" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">6</text>
    <text x="50" y="32" font-size="14" font-weight="800" fill="#F25C26">明確地使用工具：</text>
    <g font-size="11" fill="#333">
      <circle cx="24" cy="58" r="2.2" fill="#F25C26"/><text x="33" y="62" font-weight="700">網路搜尋：</text><text x="100" y="62">每個主張用 2 個以上來源查證</text>
      <circle cx="24" cy="86" r="2.2" fill="#F25C26"/><text x="33" y="90" font-weight="700">Gmail／雲端／行事曆：</text>
      <text x="33" y="104">指名確切的動作與聯絡人</text>
    </g>
  </g>

  <!-- 7 8 9 -->
  <g transform="translate(30,668)">
    <circle cx="14" cy="20" r="14" fill="#E0457B"/><text x="14" y="26" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">7</text>
    <text x="34" y="16" font-size="12.5" font-weight="800" fill="#E0457B">執行前：</text>
    <g font-size="10.5" fill="#333">
      <circle cx="6" cy="38" r="2" fill="#E0457B"/><text x="14" y="42">任何不清楚處用 AskUserQuestion</text>
      <circle cx="6" cy="58" r="2" fill="#E0457B"/><text x="14" y="62">完全照我的答案執行</text>
      <circle cx="6" cy="78" r="2" fill="#E0457B"/><text x="14" y="82">不要默默補上空缺</text>
    </g>
  </g>
  <g transform="translate(250,668)">
    <circle cx="14" cy="20" r="14" fill="#2b6cb0"/><text x="14" y="26" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">8</text>
    <text x="34" y="16" font-size="12.5" font-weight="800" fill="#2b6cb0">先列出 3 條規則：</text>
    <g font-size="10.5" fill="#333">
      <circle cx="6" cy="38" r="2" fill="#2b6cb0"/><text x="14" y="42">從我的脈絡檔中挑出</text>
      <text x="14" y="56">對此任務最重要的</text>
      <circle cx="6" cy="72" r="2" fill="#2b6cb0"/><text x="14" y="76">再用 5 步給我執行計畫</text>
    </g>
  </g>
  <g transform="translate(470,668)">
    <circle cx="14" cy="20" r="14" fill="#7C4DD1"/><text x="14" y="26" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">9</text>
    <text x="34" y="16" font-size="12.5" font-weight="800" fill="#7C4DD1">對齊之後：</text>
    <g font-size="10.5" fill="#333">
      <circle cx="6" cy="38" r="2" fill="#7C4DD1"/><text x="14" y="42">超越基本要求</text>
      <circle cx="6" cy="58" r="2" fill="#7C4DD1"/><text x="14" y="62">當成真正的客戶交付物</text>
      <circle cx="6" cy="78" r="2" fill="#7C4DD1"/><text x="14" y="82">回答前先思考</text>
    </g>
  </g>
  <text x="350" y="800" font-size="11" fill="#999" text-anchor="middle">中文重製版 · 依原圖風格重繪</text>
</svg>
