<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1000" font-family="'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif">
  <rect width="720" height="1000" fill="#FBFAFF"/>
