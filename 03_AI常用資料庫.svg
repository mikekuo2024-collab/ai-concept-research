<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 940" font-family="'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif">
  <rect width="760" height="940" fill="#ffffff"/>
  <rect x="28" y="22" width="300" height="52" rx="6" fill="#9CD0F5"/>
  <text x="40" y="62" font-size="40" font-weight="800" fill="#111">AI 常用</text>
  <text x="345" y="62" font-size="40" font-weight="800" fill="#111">資料庫</text>

  <!-- card helper boxes -->
  <!-- Graph -->
  <g transform="translate(28,96)">
    <rect width="346" height="248" rx="10" fill="#fff" stroke="#222" stroke-width="1.5"/>
    <rect x="18" y="16" width="150" height="30" rx="6" fill="#BDE8C8"/>
    <text x="30" y="37" font-size="17" font-weight="800" fill="#1E7A3D">圖形資料庫</text>
    <text x="18" y="66" font-size="11.5" fill="#444">將資料以「實體」及彼此「關聯」的</text>
    <text x="18" y="82" font-size="11.5" fill="#444">形式儲存，節點之間互相連結。</text>
    <text x="18" y="104" font-size="11" font-weight="700" fill="#16a34a">Neo4j　ArangoDB</text>
    <g>
      <line x1="70" y1="170" x2="150" y2="150" stroke="#888"/><line x1="150" y1="150" x2="240" y2="135" stroke="#888"/>
      <line x1="150" y1="150" x2="120" y2="210" stroke="#888"/><line x1="150" y1="150" x2="250" y2="200" stroke="#888"/>
      <line x1="70" y1="170" x2="240" y2="135" stroke="#E2574C"/>
      <circle cx="70" cy="170" r="13" fill="#A7C7F2"/><text x="70" y="195" font-size="9" text-anchor="middle">Nike</text>
      <circle cx="150" cy="150" r="13" fill="#F2C879"/><text x="150" y="150" font-size="9" text-anchor="middle">Matt</text>
      <circle cx="150" cy="120" r="13" fill="#F2B0C0"/><text x="150" y="105" font-size="9" text-anchor="middle">Gerad</text>
      <circle cx="240" cy="135" r="13" fill="#333"/><text x="262" y="138" font-size="9">Ivan</text>
      <circle cx="120" cy="210" r="13" fill="#E8923A"/><text x="120" y="232" font-size="9" text-anchor="middle">Sarah</text>
      <circle cx="250" cy="200" r="13" fill="#8FD4E8"/><text x="272" y="203" font-size="9">David</text>
      <text x="180" y="128" font-size="8" fill="#777">好友關係</text>
    </g>
  </g>
  <!-- Relational -->
  <g transform="translate(386,96)">
    <rect width="346" height="248" rx="10" fill="#fff" stroke="#222" stroke-width="1.5"/>
    <rect x="18" y="16" width="180" height="30" rx="6" fill="#F6D98C"/>
    <text x="30" y="37" font-size="17" font-weight="800" fill="#B7791F">關聯式資料庫</text>
    <text x="18" y="66" font-size="11.5" fill="#444">以資料表儲存與組織彼此相關的</text>
    <text x="18" y="82" font-size="11.5" fill="#444">資料點（列與欄）。</text>
    <text x="18" y="104" font-size="11" font-weight="700" fill="#2563eb">MySQL　SQLite</text>
    <g font-size="9" fill="#333">
      <rect x="20" y="120" width="120" height="100" fill="#EAF1FB" stroke="#88a"/>
      <line x1="80" y1="120" x2="80" y2="220" stroke="#88a"/>
      <text x="30" y="135">姓名</text><text x="92" y="135">追蹤數</text>
      <line x1="20" y1="140" x2="140" y2="140" stroke="#88a"/>
      <text x="30" y="156">Rohit</text><text x="100" y="156">28</text>
      <text x="30" y="174">Alex</text><text x="100" y="174">32</text>
      <text x="30" y="192">John</text><text x="100" y="192">45</text>
      <text x="30" y="210">Anshu</text><text x="100" y="210">50</text>
      <rect x="210" y="120" width="120" height="50" fill="#fff" stroke="#88a"/><line x1="270" y1="120" x2="270" y2="170" stroke="#88a"/>
      <text x="220" y="135">Rohit</text><text x="285" y="135">28</text><line x1="210" y1="140" x2="330" y2="140" stroke="#88a"/><text x="220" y="158">Alex</text><text x="285" y="158">32</text>
      <rect x="210" y="180" width="120" height="50" fill="#fff" stroke="#88a"/><line x1="270" y1="180" x2="270" y2="230" stroke="#88a"/>
      <text x="220" y="196">John</text><text x="285" y="196">45</text><line x1="210" y1="200" x2="330" y2="200" stroke="#88a"/><text x="220" y="218">Anshu</text><text x="285" y="218">50</text>
      <path d="M140 160 C175 145, 180 145, 210 145" fill="none" stroke="#333"/>
      <path d="M140 185 C175 205, 180 205, 210 205" fill="none" stroke="#333"/>
    </g>
  </g>
  <!-- Time series -->
  <g transform="translate(28,358)">
    <rect width="346" height="248" rx="10" fill="#fff" stroke="#222" stroke-width="1.5"/>
    <rect x="18" y="16" width="200" height="30" rx="6" fill="#F6B8C8"/>
    <text x="30" y="37" font-size="17" font-weight="800" fill="#B83D5E">時間序列資料庫</text>
    <text x="18" y="66" font-size="11.5" fill="#444">為儲存與查詢「隨時間蒐集的時間</text>
    <text x="18" y="82" font-size="11.5" fill="#444">戳記資料點」而最佳化。</text>
    <text x="18" y="104" font-size="11" font-weight="700" fill="#0ea5e9">InfluxDB　Timescale</text>
    <g>
      <rect x="40" y="120" width="280" height="90" fill="#FFF7E6"/>
      <polyline points="40,180 80,175 120,160 160,150 200,158 240,168 280,165 320,170" fill="none" stroke="#E8923A" stroke-width="2"/>
      <polygon points="40,180 80,175 120,160 160,150 200,158 240,168 280,165 320,170 320,210 40,210" fill="#F8C98A" opacity="0.5"/>
      <text x="180" y="234" font-size="10" font-weight="700" fill="#B7791F" text-anchor="middle">範例：天氣資料 · 股價 · 物聯網(IoT)</text>
    </g>
  </g>
  <!-- Vector -->
  <g transform="translate(386,358)">
    <rect width="346" height="248" rx="10" fill="#fff" stroke="#222" stroke-width="1.5"/>
    <rect x="18" y="16" width="170" height="30" rx="6" fill="#9CD0F5"/>
    <text x="30" y="37" font-size="17" font-weight="800" fill="#1E5FA8">向量資料庫</text>
    <text x="18" y="66" font-size="11.5" fill="#444">設計來儲存、索引與查詢「高維度</text>
    <text x="18" y="82" font-size="11.5" fill="#444">資料點」（向量嵌入）。</text>
    <text x="18" y="104" font-size="11" font-weight="700" fill="#7C4DD1">Pinecone　Weaviate</text>
    <g font-size="11" fill="#333">
      <text x="18" y="138" font-weight="700">文件</text><text x="80" y="138">📄📄</text>
      <text x="18" y="170" font-weight="700">切塊</text>
      <rect x="80" y="158" width="46" height="16" fill="#FBE0C0" stroke="#999"/><text x="103" y="170" font-size="8" text-anchor="middle">區塊1</text>
      <rect x="130" y="158" width="46" height="16" fill="#FBE0C0" stroke="#999"/><text x="153" y="170" font-size="8" text-anchor="middle">區塊2</text>
      <text x="18" y="204" font-weight="700">嵌入</text>
      <rect x="80" y="192" width="130" height="16" fill="#fff" stroke="#999"/><text x="84" y="204" font-size="8">[0.12,-0.85,0.33,...]</text>
      <line x1="48" y1="142" x2="48" y2="160" stroke="#333"/><line x1="48" y1="176" x2="48" y2="194" stroke="#333"/>
      <ellipse cx="285" cy="150" rx="36" ry="12" fill="#D8C4F0" stroke="#7C4DD1"/>
      <rect x="249" y="150" width="72" height="50" fill="#E8DCF7" stroke="#7C4DD1"/>
      <ellipse cx="285" cy="200" rx="36" ry="12" fill="#C4A8E8" stroke="#7C4DD1"/>
      <text x="285" y="132" font-size="10" font-weight="700" fill="#1E5FA8" text-anchor="middle">向量 DB</text>
    </g>
  </g>
  <!-- Document -->
  <g transform="translate(28,620)">
    <rect width="346" height="280" rx="10" fill="#fff" stroke="#222" stroke-width="1.5"/>
    <rect x="18" y="16" width="180" height="30" rx="6" fill="#9CD0F5"/>
    <text x="30" y="37" font-size="17" font-weight="800" fill="#1E5FA8">文件資料庫</text>
    <text x="18" y="66" font-size="11.5" fill="#444">以彈性的 JSON 式文件儲存資料，</text>
    <text x="18" y="82" font-size="11.5" fill="#444">結構動態，適合非結構化資料。</text>
    <text x="18" y="104" font-size="11" font-weight="700" fill="#16a34a">MongoDB　CouchDB</text>
    <g font-size="9" fill="#333">
      <rect x="130" y="120" width="90" height="60" fill="#DCE9FB" stroke="#88a"/><text x="175" y="135" text-anchor="middle" font-weight="700">Person</text>
      <text x="138" y="152">-Name</text><text x="138" y="166">-Age</text><text x="138" y="178">-Setname()</text>
      <rect x="30" y="210" width="90" height="60" fill="#DCE9FB" stroke="#88a"/><text x="75" y="225" text-anchor="middle" font-weight="700">Student</text>
      <text x="38" y="242">-Rollno</text><text x="38" y="256">-Branch</text><text x="38" y="268">-Setmarks()</text>
      <rect x="228" y="210" width="100" height="60" fill="#DCE9FB" stroke="#88a"/><text x="278" y="225" text-anchor="middle" font-weight="700">Engineer</text>
      <text x="236" y="242">-E_ID</text><text x="236" y="256">-Department</text><text x="236" y="268">-Countpage()</text>
      <path d="M120 230 C150 210,150 200,160 182" fill="none" stroke="#333"/>
      <path d="M228 230 C200 210,195 200,190 182" fill="none" stroke="#333"/>
    </g>
  </g>
  <!-- Key-Value -->
  <g transform="translate(386,620)">
    <rect width="346" height="280" rx="10" fill="#fff" stroke="#222" stroke-width="1.5"/>
    <rect x="18" y="16" width="200" height="30" rx="6" fill="#9CD0F5"/>
    <text x="30" y="37" font-size="17" font-weight="800" fill="#1E5FA8">鍵值資料庫</text>
    <text x="18" y="66" font-size="11.5" fill="#444">一種非關聯式 (NoSQL) 資料庫，以</text>
    <text x="18" y="82" font-size="11.5" fill="#444">「鍵-值」對的集合來儲存資料。</text>
    <text x="18" y="104" font-size="11" font-weight="700" fill="#dc2626">Redis　DynamoDB</text>
    <g font-size="10" fill="#333">
      <rect x="30" y="120" width="60" height="22" rx="4" fill="#7DCFA0"/><text x="60" y="135" text-anchor="middle" font-weight="700" fill="#fff">Key</text>
      <rect x="150" y="120" width="60" height="22" rx="4" fill="#CFE0F5"/><text x="180" y="135" text-anchor="middle">Value</text>
      <rect x="260" y="120" width="60" height="22" rx="4" fill="#CFE0F5"/><text x="290" y="135" text-anchor="middle">Value</text>
      <line x1="30" y1="156" x2="320" y2="156" stroke="#bbb" stroke-dasharray="4"/>
      <rect x="30" y="166" width="50" height="22" rx="4" fill="#BFE6FA"/><text x="55" y="181" text-anchor="middle">K1</text>
      <rect x="150" y="166" width="60" height="22" rx="4" fill="#BFE6FA"/><text x="180" y="181" text-anchor="middle">AA</text>
      <rect x="260" y="166" width="60" height="22" rx="4" fill="#BFE6FA"/><text x="290" y="181" text-anchor="middle">AAA</text>
      <rect x="30" y="196" width="50" height="22" rx="4" fill="#BFE6FA"/><text x="55" y="211" text-anchor="middle">K2</text>
      <rect x="150" y="196" width="60" height="22" rx="4" fill="#BFE6FA"/><text x="180" y="211" text-anchor="middle">B</text>
      <rect x="30" y="226" width="50" height="22" rx="4" fill="#BFE6FA"/><text x="55" y="241" text-anchor="middle">K3</text>
      <rect x="150" y="226" width="60" height="22" rx="4" fill="#BFE6FA"/><text x="180" y="241" text-anchor="middle">CCC</text>
      <rect x="260" y="226" width="60" height="22" rx="4" fill="#BFE6FA"/><text x="290" y="241" text-anchor="middle">CCCC</text>
      <line x1="80" y1="177" x2="150" y2="177" stroke="#333"/><line x1="80" y1="207" x2="150" y2="207" stroke="#333"/><line x1="80" y1="237" x2="150" y2="237" stroke="#333"/>
    </g>
  </g>
  <text x="380" y="928" font-size="11" fill="#bbb" text-anchor="middle">中文重製版 · 依原圖風格重繪</text>
</svg>
