<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 880" font-family="'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif">
  <rect width="760" height="880" fill="#F4F6F2"/>
  <text x="30" y="40" font-size="20" font-weight="800" fill="#1a1a2e">使用者專業度分級（分類器如何判讀）</text>
  <!-- header row -->
  <g>
    <rect x="28" y="56" width="120" height="40" fill="#E3E8DF" stroke="#ccd"/>
    <rect x="148" y="56" width="240" height="40" fill="#E3E8DF" stroke="#ccd"/>
    <rect x="388" y="56" width="344" height="40" fill="#E3E8DF" stroke="#ccd"/>
    <text x="40" y="81" font-size="13" font-weight="700" fill="#333">專業度</text>
    <text x="160" y="81" font-size="13" font-weight="700" fill="#333">分類器觀察的訊號</text>
    <text x="400" y="81" font-size="13" font-weight="700" fill="#333">一段對話中的代表性提問</text>
  </g>
  <!-- rows -->
  <!-- L1 -->
  <g>
    <rect x="28" y="96" width="120" height="130" fill="#fff" stroke="#ddd"/>
    <rect x="148" y="96" width="240" height="130" fill="#fff" stroke="#ddd"/>
    <rect x="388" y="96" width="344" height="130" fill="#fff" stroke="#ddd"/>
    <text x="40" y="120" font-size="13" font-weight="700" fill="#1a1a2e">1（新手）</text>
    <g font-size="10.5" fill="#444"><text x="158" y="118">提問沒有領域專門術語。</text><text x="158" y="136">查證請求即使有也很籠統</text><text x="158" y="154">（如「再檢查一下」）。</text><text x="158" y="172">使用者認不出 Claude 的錯。</text></g>
    <g font-size="10.5" fill="#444"><text x="398" y="118"><tspan font-weight="700" fill="#111">第1問：</tspan>你能分析這份資料並做成圖表嗎？</text><text x="398" y="140"><tspan font-weight="700" fill="#111">第3問：</tspan>也能讓它顯示隨時間的趨勢嗎？</text><text x="398" y="162"><tspan font-weight="700" fill="#111">第6問：</tspan>這不是我要的，請再檢查你做了什麼。</text></g>
  </g>
  <!-- L2 -->
  <g>
    <rect x="28" y="226" width="120" height="120" fill="#FBFCFA" stroke="#ddd"/>
    <rect x="148" y="226" width="240" height="120" fill="#FBFCFA" stroke="#ddd"/>
    <rect x="388" y="226" width="344" height="120" fill="#FBFCFA" stroke="#ddd"/>
    <text x="40" y="250" font-size="13" font-weight="700" fill="#1a1a2e">2（初級）</text>
    <g font-size="10.5" fill="#444"><text x="158" y="248">提問帶有一些領域術語。</text><text x="158" y="266">查證請求沒有針對性。</text><text x="158" y="284">使用者只在明顯錯誤上</text><text x="158" y="302">才反駁。</text></g>
    <g font-size="10.5" fill="#444"><text x="398" y="248"><tspan font-weight="700" fill="#111">第1問：</tspan>BigQuery 是什麼</text><text x="398" y="270"><tspan font-weight="700" fill="#111">第2問：</tspan>能幫我做個小測試、帶我一步步走嗎？</text><text x="398" y="292"><tspan font-weight="700" fill="#111">第5問：</tspan>我怎麼知道有沒有核准？</text><text x="398" y="314"><tspan font-weight="700" fill="#111">第12問：</tspan>等等，你用了我同事的確切規格嗎？</text></g>
  </g>
  <!-- L3 -->
  <g>
    <rect x="28" y="346" width="120" height="140" fill="#fff" stroke="#ddd"/>
    <rect x="148" y="346" width="240" height="140" fill="#fff" stroke="#ddd"/>
    <rect x="388" y="346" width="344" height="140" fill="#fff" stroke="#ddd"/>
    <text x="40" y="370" font-size="13" font-weight="700" fill="#1a1a2e">3（中級）</text>
    <g font-size="10.5" fill="#444"><text x="158" y="368">提問帶有一些領域具體性，</text><text x="158" y="386">但未深入方法論或取捨。</text><text x="158" y="404">會要求一些非籠統的檢查，</text><text x="158" y="422">也可能注意到 Claude 的錯。</text></g>
    <g font-size="10" fill="#444"><text x="398" y="368"><tspan font-weight="700" fill="#111">第1問：</tspan>你能確認這個分支可以合併嗎？</text><text x="398" y="388"><tspan font-weight="700" fill="#111">第7問：</tspan>我們是否該為頁面每一段拆分擷取器，</text><text x="398" y="402">這樣就能對各區段做快取最佳化？</text><text x="398" y="424"><tspan font-weight="700" fill="#111">第19問：</tspan>目前都好—快取進度到哪了？你覺得</text><text x="398" y="438">你的改動會不會拖垮 egress？</text></g>
  </g>
  <!-- L4 -->
  <g>
    <rect x="28" y="486" width="120" height="150" fill="#FBFCFA" stroke="#ddd"/>
    <rect x="148" y="486" width="240" height="150" fill="#FBFCFA" stroke="#ddd"/>
    <rect x="388" y="486" width="344" height="150" fill="#FBFCFA" stroke="#ddd"/>
    <text x="40" y="510" font-size="13" font-weight="700" fill="#1a1a2e">4（進階）</text>
    <g font-size="10.5" fill="#444"><text x="158" y="508">展現領域知識，會主動預判</text><text x="158" y="526">一些取捨。查證請求有針對</text><text x="158" y="544">性。至少抓到一個 Claude 的</text><text x="158" y="562">領域錯誤。</text></g>
    <g font-size="10" fill="#444"><text x="398" y="508"><tspan font-weight="700" fill="#111">第2問：</tspan>進到 stage 3 之前該怎麼測這一階段？</text><text x="398" y="528"><tspan font-weight="700" fill="#111">第5問：</tspan>agent console 跟一般對話差在哪？我</text><text x="398" y="542">蠻確定只能透過這個 session console 跟它互動</text><text x="398" y="564"><tspan font-weight="700" fill="#111">第88問：</tspan>看來解析修正沒成功—檔案行數還是 742</text><text x="398" y="586"><tspan font-weight="700" fill="#111">第106問：</tspan>比起 regex，有沒有更穩的方式抽 user turn？</text></g>
  </g>
  <!-- L5 -->
  <g>
    <rect x="28" y="636" width="120" height="170" fill="#fff" stroke="#ddd"/>
    <rect x="148" y="636" width="240" height="170" fill="#fff" stroke="#ddd"/>
    <rect x="388" y="636" width="344" height="170" fill="#fff" stroke="#ddd"/>
    <text x="40" y="660" font-size="13" font-weight="700" fill="#1a1a2e">5（專家）</text>
    <g font-size="10.5" fill="#444"><text x="158" y="658">使用精密的領域行話，預判</text><text x="158" y="676">複雜取捨與設計決策。查證</text><text x="158" y="694">精準、針對弱點。會糾正</text><text x="158" y="712">Claude，而 Claude 幾乎不需</text><text x="158" y="730">糾正使用者。</text></g>
    <g font-size="9.5" fill="#444"><text x="398" y="658"><tspan font-weight="700" fill="#111">第1問：</tspan>我要深入查［使用者］回報的這個問題：［url］</text><text x="398" y="672">上一個 release 的 PR 修法不夠，有其他想法嗎？</text><text x="398" y="694"><tspan font-weight="700" fill="#111">第3問：</tspan>程式清過後就不該再回傳那段了</text><text x="398" y="716"><tspan font-weight="700" fill="#111">第64問：</tspan>對，也該注意我們可能得把硬重新整理進</text><text x="398" y="730">一步拆成 managed 與 unmanaged slot，每 30 分刷一次</text><text x="398" y="752"><tspan font-weight="700" fill="#111">第108問：</tspan>該用重試而非盡力而為嗎？同步需可靠</text><text x="398" y="766">記住原始 bug：值過期導致無限迴圈設 pin</text></g>
  </g>
  <text x="380" y="836" font-size="11" fill="#999" text-anchor="middle">中文重製版 · 依原圖風格重繪</text>
</svg>
